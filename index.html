<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Prachi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            background-color: #000000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: relative;
        }
        
        /* Scene 1 Layout - Replicating 1000088972_3.png Exactly */
        #ui-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: flex-end;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.5s ease;
            width: 340px;
        }
        .heart-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
            flex-shrink: 0;
        }
        .heart-btn {
            width: 60px;
            height: 60px;
            background-color: #ffb7c5;
            position: absolute;
            transform: rotate(-45deg);
            animation: beat 1.8s infinite ease-in-out;
        }
        .heart-btn::before, .heart-btn::after {
            content: '';
            width: 60px;
            height: 60px;
            background-color: #ffb7c5;
            border-radius: 50%;
            position: absolute;
        }
        .heart-btn::before { top: -30px; left: 0; }
        .heart-btn::after { left: 30px; top: 0; }

        @keyframes beat {
            0%, 100% { transform: scale(1) rotate(-45deg); }
            50% { transform: scale(1.06) rotate(-45deg); }
        }
        
        /* Content Panel Layout matching the image exactly */
        .content-panel {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-left: -5px; /* Pulls the line path start perfectly into the heart edge */
            position: relative;
        }
        .text-box {
            display: flex;
            flex-direction: column;
            color: #ffffff;
            padding-left: 15px; /* Creates safe gap so text never overlaps the heart */
            margin-bottom: 2px;
        }
        .text-line1 {
            font-size: 19px;
            font-weight: 400;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        .text-line2 {
            font-size: 21px;
            font-weight: 500;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        /* Exact SVG Line Connection Design from 1000088972_3.png */
        .custom-wireframe {
            position: relative;
            width: 280px;
            height: 25px;
            margin-top: -12px; /* Pulls line up to align perfectly with heart's lower-right quadrant */
        }
        .custom-wireframe svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Canvas Render Frame */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }
        
        /* Left Messages Panel Design */
        #message-panel {
            position: absolute;
            left: 8%;
            top: 15%;
            width: 46%;
            height: 70%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 5;
            color: #ffffff;
        }
        .msg-line {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 18px;
            font-weight: 400;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1.5s ease, transform 1.5s ease;
            color: #fff0f3;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.9);
        }
        .msg-line.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .msg-highlight {
            color: #ffb7c5;
            font-weight: 600;
            font-size: 21px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <!-- UI Overlay matching 1000088972_3.png -->
    <div id="ui-container">
        <div class="heart-wrapper">
            <div class="heart-btn"></div>
        </div>
        <div class="content-panel">
            <div class="text-box">
                <span class="text-line1">Click Me:)</span>
                <span class="text-line2">Birthday Queen !</span>
            </div>
            <div class="custom-wireframe">
                <!-- SVG path starting from heart tip area, bending down-right, then straight right -->
                <svg viewBox="0 0 280 25" preserveAspectRatio="none">
                    <path d="M 0 0 L 18 18 L 280 18" stroke="#ffb7c5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="message-panel">
        <div class="msg-line msg-highlight" id="msg1">Hey Prachi..❣️</div>
        <div class="msg-line" id="msg2">Happy Birthday..🎂</div>
        <div class="msg-line" id="msg3">May God bless you with endless happiness and success..💫</div>
        <div class="msg-line" id="msg4">Just saying… Maybe God made you extra special, because people like you are rare..🤌</div>
        <div class="msg-line" id="msg5">Hope your day is as cute and amazing as you are..😘</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const uiContainer = document.getElementById('ui-container');
        const bgMusic = document.getElementById('bgMusic');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let state = 'waiting'; 
        let animationStartTime = 0;
        let fallingHeart = { x: 0, y: 0, vy: 0, gravity: 0.4, size: 22 };
        let groundY = canvas.height * 0.85;
        
        let treeCenterX = canvas.width / 2;
        let currentTreeX = canvas.width / 2;
        let targetTreeX = canvas.width * 0.82; 

        let branches = [];
        let leaves = [];
        let continuousFallingHearts = [];
        const leafColors = ['#ff4d6d', '#ff758f', '#ff85a1', '#f72585', '#ffb7c5', '#ffbe0b', '#ff007f'];

        function drawCanvasHeart(x, y, size, color) {
            ctx.save();
            ctx.beginPath();
            ctx.translate(x, y);
            ctx.rotate(-Math.PI / 4);
            ctx.fillStyle = color;
            ctx.moveTo(0, 0);
            ctx.arc(size / 2, 0, size / 2, 0, Math.PI, true);
            ctx.arc(0, -size / 2, size / 2, 0, Math.PI, true);
            ctx.lineTo(0, 0);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        uiContainer.addEventListener('click', () => {
            if (state !== 'waiting') return;
            bgMusic.play().catch(e => console.log(e));

            uiContainer.style.opacity = '0';
            setTimeout(() => uiContainer.style.display = 'none', 500);

            fallingHeart.x = canvas.width / 2;
            fallingHeart.y = canvas.height / 3;
            fallingHeart.vy = 1;
            
            state = 'falling';
            requestAnimationFrame(animate);
        });

        class Branch {
            constructor(startX, startY, endX, endY, maxThickness, growStart, growDuration) {
                this.startX = startX;
                this.startY = startY;
                this.endX = endX;
                this.endY = endY;
                this.maxThickness = maxThickness;
                this.growStart = growStart;      
                this.growDuration = growDuration;
            }
            draw(offsetX, elapsed) {
                if (elapsed < this.growStart) return; 
                let progress = Math.min((elapsed - this.growStart) / this.growDuration, 1);
                
                let curX = this.startX + (this.endX - this.startX) * progress;
                let curY = this.startY + (this.endY - this.startY) * progress;

                ctx.beginPath();
                ctx.moveTo(this.startX + offsetX, this.startY);
                ctx.lineTo(curX + offsetX, curY);
                ctx.strokeStyle = '#ffb7c5';
                ctx.lineWidth = this.maxThickness * (1 - progress * 0.2);
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        class Leaf {
            constructor(relX, relY, targetSize, color, bloomStart, bloomDuration) {
                this.relX = relX; 
                this.relY = relY;
                this.targetSize = targetSize;
                this.color = color;
                this.bloomStart = bloomStart;
                this.bloomDuration = bloomDuration;
            }
            draw(offsetX, elapsed) {
                if (elapsed < this.bloomStart) return;
                let progress = Math.min((elapsed - this.bloomStart) / this.bloomDuration, 1);
                let curSize = this.targetSize * progress;

                if (curSize > 0) {
                    drawCanvasHeart(this.relX + offsetX, this.relY, curSize, this.color);
                }
            }
        }

        // Expanded tree architecture configuration mapped over an 11-Minute timeframe
        function buildTreeStructure(startX, startY, length, angle, thickness, depth, currentDelay) {
            if (depth === 0) return;

            let endX = startX + Math.cos(angle) * length;
            let endY = startY + Math.sin(angle) * length;

            let relStartX = startX - treeCenterX;
            let relEndX = endX - treeCenterX;

            // Highly extended scale timing configurations for an 11-minute total lifespan
            let branchGrowTime = 25000 + (7 - depth) * 8000; 
            branches.push(new Branch(relStartX, startY, relEndX, endY, thickness, currentDelay, branchGrowTime));

            let nextDelay = currentDelay + branchGrowTime * 0.55;

            if (depth <= 4) {
                let leavesCount = (5 - depth) * 4;
                for (let i = 0; i < leavesCount; i++) {
                    let rx = relEndX + (Math.random() - 0.5) * 45;
                    let ry = endY + (Math.random() - 0.5) * 45;
                    let size = Math.random() * 3 + 4.5;
                    let color = leafColors[Math.floor(Math.random() * leafColors.length)];
                    
                    // Staggered slow blooming sequence starts
                    let leafStart = currentDelay + branchGrowTime + Math.random() * 180000; 
                    let leafBloomDuration = 40000 + Math.random() * 30000;
                    leaves.push(new Leaf(rx, ry, size, color, leafStart, leafBloomDuration));
                }
            }

            let branchesNum = 3;
            for (let i = 0; i < branchesNum; i++) {
                let vAngle = (Math.random() - 0.5) * 0.55;
                let nextAngle = angle + (i - 1) * 0.42 + vAngle;
                let nextLength = length * (0.72 + Math.random() * 0.08);
                buildTreeStructure(endX, endY, nextLength, nextAngle, thickness * 0.65, depth - 1, nextDelay);
            }
        }

        // Messages timeline calibrated to run over exactly 9 Minutes (540,000 Milliseconds)
        function triggerTextTimeline() {
            const delays = [0, 108000, 216000, 324000, 432000]; 
            for (let i = 1; i <= 5; i++) {
                setTimeout(() => {
                    const el = document.getElementById(`msg${i}`);
                    if (el) el.classList.add('visible');
                }, delays[i - 1]);
            }
        }

        function animate(timestamp) {
            if (!animationStartTime) animationStartTime = timestamp;
            let elapsed = timestamp - animationStartTime;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.05, groundY);
            ctx.lineTo(canvas.width * 0.95, groundY);
            ctx.strokeStyle = '#ffb7c5';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            if (state === 'falling') {
                fallingHeart.vy += fallingHeart.gravity;
                fallingHeart.y += fallingHeart.vy;

                if (fallingHeart.y >= groundY) {
                    fallingHeart.y = groundY;
                    state = 'runningTimeline';
                    animationStartTime = timestamp; 
                    elapsed = 0;
                    buildTreeStructure(treeCenterX, groundY, canvas.height * 0.15, -Math.PI / 2, 10.5, 6, 0);
                }
                drawCanvasHeart(fallingHeart.x, fallingHeart.y, fallingHeart.size, '#ffb7c5');
            }

            if (state === 'runningTimeline') {
                
                // CONTROL TIMELINE: Tree grows & slides up until the 11th Minute (660,000 ms) mark
                if (elapsed >= 600000 && elapsed < 660000) { // Sliding shifts smoothly between 10th and 11th minute
                    let slideProgress = (elapsed - 600000) / 60000;
                    let ease = slideProgress < 0.5 ? 2 * slideProgress * slideProgress : -1 + (4 - 2 * slideProgress) * slideProgress;
                    currentTreeX = treeCenterX + (targetTreeX - treeCenterX) * ease;
                } else if (elapsed >= 660000) {
                    currentTreeX = targetTreeX;
                    if (elapsed >= 660000 && elapsed < 660100) {
                        triggerTextTimeline(); // Text message layer initializes at exactly 11:00
                    }
                }

                branches.forEach(b => b.draw(currentTreeX, elapsed));
                leaves.forEach(l => l.draw(currentTreeX, elapsed));

                if (elapsed >= 620000) {
                    if (continuousFallingHearts.length < 5 && Math.random() < 0.04) {
                        let randomLeaf = leaves[Math.floor(Math.random() * leaves.length)];
                        if (randomLeaf) {
                            continuousFallingHearts.push({
                                x: randomLeaf.relX + currentTreeX,
                                y: randomLeaf.relY,
                                size: Math.random() * 2.5 + 3.5,
                                vy: Math.random() * 0.4 + 0.6,
                                vx: (Math.random() - 0.5) * 0.25,
                                color: leafColors[Math.floor(Math.random() * leafColors.length)]
                            });
                        }
                    }

                    for (let i = continuousFallingHearts.length - 1; i >= 0; i--) {
                        let p = continuousFallingHearts[i];
                        p.y += p.vy;
                        p.x += p.vx;
                        
                        drawCanvasHeart(p.x, p.y, p.size, p.color);

                        if (p.y >= groundY) {
                            continuousFallingHearts.splice(i, 1);
                        }
                    }
                }
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
