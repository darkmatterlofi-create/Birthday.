<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Prachi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            background-color: #000000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: relative;
        }
        
        /* Screen 1 - Perfect Layout & Spacing to Prevent Text Overlap */
        #ui-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: flex-end;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.4s ease;
            width: 360px; /* Safe width for proper spacing */
        }
        .heart-wrapper {
            position: relative;
            width: 65px;
            height: 65px;
            flex-shrink: 0;
        }
        .heart-btn {
            width: 55px;
            height: 55px;
            background-color: #ffb7c5;
            position: absolute;
            top: 5px;
            left: 5px;
            transform: rotate(-45deg);
            animation: beat 1.4s infinite ease-in-out;
            transform-origin: center;
        }
        .heart-btn::before, .heart-btn::after {
            content: '';
            width: 55px;
            height: 55px;
            background-color: #ffb7c5;
            border-radius: 50%;
            position: absolute;
        }
        .heart-btn::before { top: -275x; top: -27.5px; left: 0; }
        .heart-btn::after { left: 27.5px; top: 0; }

        @keyframes beat {
            0%, 100% { transform: scale(1) rotate(-45deg); }
            50% { transform: scale(1.08) rotate(-45deg); }
        }
        
        .content-panel {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-left: 15px; /* Perfect gap so heart beat never touches text */
            position: relative;
        }
        .text-box {
            display: flex;
            flex-direction: column;
            color: #ffffff;
            padding-left: 20px; 
            margin-bottom: 0px;
        }
        .text-line1 {
            font-size: 19px;
            font-weight: 400;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .text-line2 {
            font-size: 21px;
            font-weight: 500;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        /* Custom Line Path matching 1000088972.png */
        .custom-wireframe {
            position: relative;
            width: 100%;
            height: 30px;
            margin-top: -8px;
        }
        .custom-wireframe svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }
        
        /* Message Panel Styling */
        #message-panel {
            position: absolute;
            left: 8%;
            top: 15%;
            width: 46%;
            height: 70%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 5;
            color: #ffffff;
        }
        .msg-line {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 18px;
            font-weight: 400;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            color: #fff0f3;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.9);
        }
        .msg-line.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .msg-highlight {
            color: #ffb7c5;
            font-weight: 600;
            font-size: 21px;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3"></audio>

    <div id="ui-container">
        <div class="heart-wrapper">
            <div class="heart-btn"></div>
        </div>
        <div class="content-panel">
            <div class="text-box">
                <span class="text-line1">Click Me:)</span>
                <span class="text-line2">Birthday Queen !</span>
            </div>
            <div class="custom-wireframe">
                <svg viewBox="0 0 280 30" preserveAspectRatio="none">
                    <path d="M 0 0 L 22 22 L 280 22" stroke="#ffb7c5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="message-panel">
        <div class="msg-line msg-highlight" id="msg1">Hey Prachi..❣️</div>
        <div class="msg-line" id="msg2">Happy Birthday..🎂</div>
        <div class="msg-line" id="msg3">May God bless you with endless happiness and success..💫</div>
        <div class="msg-line" id="msg4">Just saying… Maybe God made you extra special, because people like you are rare..🤌</div>
        <div class="msg-line" id="msg5">Hope your day is as cute and amazing as you are..😘</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const uiContainer = document.getElementById('ui-container');
        const bgMusic = document.getElementById('bgMusic');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let state = 'waiting'; 
        let animationStartTime = 0;
        let fallingHeart = { x: 0, y: 0, vy: 0, gravity: 0.5, size: 24 };
        let groundY = canvas.height * 0.85;
        
        let treeCenterX = canvas.width / 2;
        let currentTreeX = canvas.width / 2;
        let targetTreeX = canvas.width * 0.82; 

        let branches = [];
        let leaves = [];
        let continuousFallingHearts = [];
        // Fixed Colors: Red, Orange, Yellow, Pink
        const leafColors = ['#ff0f39', '#ff7300', '#ffcc00', '#ff758f', '#ffb7c5', '#ff4d6d'];

        // Math algorithm to draw a high-fidelity perfect Heart shape on Canvas
        function drawPerfectHeart(x, y, size, color) {
            ctx.save();
            ctx.beginPath();
            ctx.translate(x, y);
            ctx.fillStyle = color;
            
            // Top point center of heart split
            ctx.moveTo(0, -size * 0.3);
            // Left curve
            ctx.bezierCurveTo(-size * 0.5, -size * 0.8, -size * 1.1, -size * 0.4, -size * 1.1, size * 0.1);
            ctx.bezierCurveTo(-size * 1.1, size * 0.55, -size * 0.5, size * 0.9, 0, size * 1.3);
            // Right curve
            ctx.bezierCurveTo(size * 0.5, size * 0.9, size * 1.1, size * 0.55, size * 1.1, size * 0.1);
            ctx.bezierCurveTo(size * 1.1, -size * 0.4, size * 0.5, -size * 0.8, 0, -size * 0.3);
            
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // Instant audio setup and sync reset logic
        uiContainer.addEventListener('click', () => {
            if (state !== 'waiting') return;
            
            // Instant Music Trigger
            bgMusic.currentTime = 0;
            bgMusic.play().catch(e => console.log("Audio play failed:", e));

            uiContainer.style.opacity = '0';
            setTimeout(() => uiContainer.style.display = 'none', 400);

            fallingHeart.x = canvas.width / 2;
            fallingHeart.y = canvas.height / 3;
            fallingHeart.vy = 2;
            
            state = 'falling';
            requestAnimationFrame(animate);
        });

        // Track looped audio timeline cleanly
        bgMusic.addEventListener('ended', () => {
            resetWholeTimeline();
        });

        class Branch {
            constructor(startX, startY, endX, endY, maxThickness, growStart, growDuration) {
                this.startX = startX;
                this.startY = startY;
                this.endX = endX;
                this.endY = endY;
                this.maxThickness = maxThickness;
                this.growStart = growStart;      
                this.growDuration = growDuration;
            }
            draw(offsetX, elapsed) {
                if (elapsed < this.growStart) return; 
                let progress = Math.min((elapsed - this.growStart) / this.growDuration, 1);
                
                let curX = this.startX + (this.endX - this.startX) * progress;
                let curY = this.startY + (this.endY - this.startY) * progress;

                ctx.beginPath();
                ctx.moveTo(this.startX + offsetX, this.startY);
                ctx.lineTo(curX + offsetX, curY);
                ctx.strokeStyle = '#ffb7c5';
                ctx.lineWidth = this.maxThickness * (1 - progress * 0.25);
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        class Leaf {
            constructor(relX, relY, targetSize, color, bloomStart, bloomDuration) {
                this.relX = relX; 
                this.relY = relY;
                this.targetSize = targetSize;
                this.color = color;
                this.bloomStart = bloomStart;
                this.bloomDuration = bloomDuration;
            }
            draw(offsetX, elapsed) {
                if (elapsed < this.bloomStart) return;
                let progress = Math.min((elapsed - this.bloomStart) / this.bloomDuration, 1);
                let curSize = this.targetSize * progress;

                if (curSize > 0) {
                    drawPerfectHeart(this.relX + offsetX, this.relY, curSize, this.color);
                }
            }
        }

        // Recursive mathematical generation for the tree structure mapped strictly within 11 seconds budget
        function buildTreeStructure(startX, startY, length, angle, thickness, depth, currentDelay) {
            if (depth === 0) return;

            let endX = startX + Math.cos(angle) * length;
            let endY = startY + Math.sin(angle) * length;

            let relStartX = startX - treeCenterX;
            let relEndX = endX - treeCenterX;

            // Strict distribution to guarantee full structural expansion across 11 seconds
            let branchGrowTime = 250 + (6 - depth) * 120; 
            branches.push(new Branch(relStartX, startY, relEndX, endY, thickness, currentDelay, branchGrowTime));

            let nextDelay = currentDelay + branchGrowTime * 0.55;

            if (depth <= 4) {
                let leavesCount = (5 - depth) * 5;
                for (let i = 0; i < leavesCount; i++) {
                    let rx = relEndX + (Math.random() - 0.5) * 55;
                    let ry = endY + (Math.random() - 0.5) * 55;
                    let size = Math.random() * 2 + 3.5;
                    let color = leafColors[Math.floor(Math.random() * leafColors.length)];
                    
                    // Bloom is strategically scaled to match the growth milestones
                    let leafStart = currentDelay + branchGrowTime + Math.random() * 2200; 
                    let leafBloomDuration = 800 + Math.random() * 700;
                    leaves.push(new Leaf(rx, ry, size, color, leafStart, leafBloomDuration));
                }
            }

            let branchesNum = 3;
            for (let i = 0; i < branchesNum; i++) {
                let vAngle = (Math.random() - 0.5) * 0.5;
                let nextAngle = angle + (i - 1) * 0.4 + vAngle;
                let nextLength = length * (0.7 + Math.random() * 0.08);
                buildTreeStructure(endX, endY, nextLength, nextAngle, thickness * 0.65, depth - 1, nextDelay);
            }
        }

        // Precise incremental execution map for messages over the final 9 seconds
        let textTimeouts = [];
        function triggerTextTimeline() {
            // Strict pacing breakdown matching 9000ms total budget
            const delays = [0, 1600, 3200, 5000, 6800]; 
            for (let i = 1; i <= 5; i++) {
                let t = setTimeout(() => {
                    const el = document.getElementById(`msg${i}`);
                    if (el) el.classList.add('visible');
                }, delays[i - 1]);
                textTimeouts.push(t);
            }
        }

        // Loop execution resets structural parameters to repeat perfectly at 20000ms
        function resetWholeTimeline() {
            textTimeouts.forEach(t => clearTimeout(t));
            textTimeouts = [];
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`msg${i}`);
                if (el) el.classList.remove('visible');
            }
            branches = [];
            leaves = [];
            continuousFallingHearts = [];
            currentTreeX = treeCenterX;
            
            bgMusic.currentTime = 0;
            bgMusic.play().catch(e => console.log(e));
            
            animationStartTime = performance.now();
            buildTreeStructure(treeCenterX, groundY, canvas.height * 0.16, -Math.PI / 2, 11, 6, 0);
        }

        function animate(timestamp) {
            if (!animationStartTime) animationStartTime = timestamp;
            let elapsed = timestamp - animationStartTime;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground base line rendering
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.05, groundY);
            ctx.lineTo(canvas.width * 0.95, groundY);
            ctx.strokeStyle = '#ffb7c5';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            if (state === 'falling') {
                fallingHeart.vy += fallingHeart.gravity;
                fallingHeart.y += fallingHeart.vy;

                if (fallingHeart.y >= groundY) {
                    fallingHeart.y = groundY;
                    state = 'runningTimeline';
                    animationStartTime = timestamp; 
                    elapsed = 0;
                    // Trigger structural generation at root node zero
                    buildTreeStructure(treeCenterX, groundY, canvas.height * 0.16, -Math.PI / 2, 11, 6, 0);
                }
                drawPerfectHeart(fallingHeart.x, fallingHeart.y, fallingHeart.size, '#ffb7c5');
            }

            if (state === 'runningTimeline') {
                
                // Absolute structural auto-reset when total synced timeline hits 20000ms (20 seconds)
                if (elapsed >= 20000) {
                    resetWholeTimeline();
                    requestAnimationFrame(animate);
                    return;
                }

                // Smooth positional interpolation between the 8.5s and 11s marker
                if (elapsed >= 8500 && elapsed < 11000) { 
                    let slideProgress = (elapsed - 8500) / 2500;
                    // Ease inside sine profile
                    let ease = Math.sin((slideProgress * Math.PI) / 2);
                    currentTreeX = treeCenterX + (targetTreeX - treeCenterX) * ease;
                } else if (elapsed >= 11000) {
                    currentTreeX = targetTreeX;
                    // Trigger text cascade at the exact 11th second boundary marker
                    if (elapsed >= 11000 && elapsed < 11040 && textTimeouts.length === 0) {
                        triggerTextTimeline();
                    }
                }

                // Render tree assets dynamically
                branches.forEach(b => b.draw(currentTreeX, elapsed));
                leaves.forEach(l => l.draw(currentTreeX, elapsed));

                // Continuous side falling wind animation engine
                if (elapsed >= 6000) {
                    if (continuousFallingHearts.length < 12 && Math.random() < 0.06) {
                        let randomLeaf = leaves[Math.floor(Math.random() * leaves.length)];
                        if (randomLeaf) {
                            continuousFallingHearts.push({
                                x: randomLeaf.relX + currentTreeX,
                                y: randomLeaf.relY,
                                size: Math.random() * 2 + 3,
                                vy: Math.random() * 0.5 + 0.8,
                                swingSpeed: Math.random() * 0.02 + 0.015,
                                swingRange: Math.random() * 1.5 + 1.2,
                                timeOffset: Math.random() * 100,
                                color: leafColors[Math.floor(Math.random() * leafColors.length)]
                            });
                        }
                    }

                    // Loop to update position of wind blown leaves smoothly
                    for (let i = continuousFallingHearts.length - 1; i >= 0; i--) {
                        let p = continuousFallingHearts[i];
                        p.y += p.vy;
                        // Math.sin configuration builds a gentle sway wind behavior
                        p.x += Math.sin(p.y * p.swingSpeed + p.timeOffset) * p.swingRange * 0.4;
                        
                        drawPerfectHeart(p.x, p.y, p.size, p.color);

                        if (p.y >= groundY) {
                            continuousFallingHearts.splice(i, 1);
                        }
                    }
                }
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
